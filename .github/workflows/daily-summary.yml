name: Daily Provisioning Summary

on:
  schedule:
    - cron: '59 23 * * *'   # ~end of day UTC (GitHub may delay; rolling 24h window handles it)
  workflow_dispatch:           # also allow manual trigger

jobs:
  summary:
    name: Send daily summary email
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch attempt logs and compile report
        id: report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESP=$(gh api repos/${{ github.repository }}/contents/attempts.json \
            -H "Accept: application/vnd.github.v3+json" \
            --method GET -F ref=logs 2>/dev/null || echo "")
          export RESP
          python3 << 'PYEOF'
          import json, os, base64, sys
          from datetime import datetime, timezone, timedelta

          resp_str = os.environ.get("RESP", "")
          out = {}
          now = datetime.now(timezone.utc)
          out["DATE"] = now.strftime("%Y-%m-%d %H:%M UTC")

          # defaults
          for r in ("MUMBAI", "STOCKHOLM"):
              out[f"{r}_24H"] = "0"
              out[f"{r}_TOTAL"] = "0"
              out[f"{r}_SUCCESS"] = "No"
              out[f"{r}_REASON"] = "n/a"
          out["OVERALL"] = "No data — log file not found"

          if resp_str:
              try:
                  data = json.loads(base64.b64decode(json.loads(resp_str)["content"]).decode())
                  attempts = data.get("attempts", [])
                  cutoff = now - timedelta(hours=24)

                  def parse(ts):
                      try:
                          return datetime.strptime(ts, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
                      except Exception:
                          return now

                  def stats(region):
                      es = [a for a in attempts if a.get("region") == region]
                      total = sum(a.get("attempts", 1) for a in es)
                      last24 = sum(a.get("attempts", 1) for a in es if parse(a.get("timestamp", "")) >= cutoff)
                      success = any(a.get("result") == "VM_CREATED" for a in es)
                      reason = "n/a"
                      for a in reversed(es):
                          if a.get("reason"):
                              reason = a["reason"]
                              break
                      return total, last24, success, reason

                  m_total, m_24, m_ok, m_reason = stats("mumbai")
                  s_total, s_24, s_ok, s_reason = stats("stockholm")
                  out["MUMBAI_TOTAL"] = str(m_total); out["MUMBAI_24H"] = str(m_24)
                  out["MUMBAI_SUCCESS"] = "Yes" if m_ok else "No"; out["MUMBAI_REASON"] = m_reason
                  out["STOCKHOLM_TOTAL"] = str(s_total); out["STOCKHOLM_24H"] = str(s_24)
                  out["STOCKHOLM_SUCCESS"] = "Yes" if s_ok else "No"; out["STOCKHOLM_REASON"] = s_reason

                  if m_ok and s_ok:
                      out["OVERALL"] = "Both VMs created successfully!"
                  elif m_ok:
                      out["OVERALL"] = "Mumbai VM created! Stockholm still trying."
                  elif s_ok:
                      out["OVERALL"] = "Stockholm VM created! Mumbai still trying."
                  else:
                      out["OVERALL"] = "Both VMs still waiting for capacity (working correctly)."
              except Exception as e:
                  print(f"Warning: could not parse attempts log: {e}", file=sys.stderr)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              for k, v in out.items():
                  f.write(f"{k}={v}\n")
          PYEOF

      - name: Send daily summary email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "📊 Oracle VM Summary — ${{ steps.report.outputs.DATE }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "Oracle Provisioner <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          body: |
            📊 Oracle VM Provisioning — Summary
            As of: ${{ steps.report.outputs.DATE }}

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            🇮🇳 Mumbai (ap-mumbai-1)
              Attempts (last 24h): ${{ steps.report.outputs.MUMBAI_24H }}
              Attempts (total):    ${{ steps.report.outputs.MUMBAI_TOTAL }}
              VM Created: ${{ steps.report.outputs.MUMBAI_SUCCESS }}
              Last status: ${{ steps.report.outputs.MUMBAI_REASON }}

            🇸🇪 Stockholm (eu-stockholm-1)
              Attempts (last 24h): ${{ steps.report.outputs.STOCKHOLM_24H }}
              Attempts (total):    ${{ steps.report.outputs.STOCKHOLM_TOTAL }}
              VM Created: ${{ steps.report.outputs.STOCKHOLM_SUCCESS }}
              Last status: ${{ steps.report.outputs.STOCKHOLM_REASON }}

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            Overall Status: ${{ steps.report.outputs.OVERALL }}

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            "last 24h" = attempts in the past 24 hours.
            "total"    = all attempts since tracking began (should keep climbing).
            Each attempt tries all fault domains. Automated report from GitHub Actions.
            Repo: https://github.com/${{ github.repository }}
