name: DIAG - count query (Stockholm)

on:
  workflow_dispatch:

env:
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Try several count methods on Stockholm (0 instances)
        run: |
          set +e
          export SUPPRESS_LABEL_WARNING=True
          mkdir -p ~/.oci
          echo "${{ secrets.STOCKHOLM_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.STOCKHOLM_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem
          CID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output 2>/dev/null)

          echo "===== M1: plain list, show exit code ====="
          oci compute instance list --compartment-id "$CID" --all >/tmp/m1.json 2>/tmp/m1.err
          echo "exit=$?  bytes=$(wc -c < /tmp/m1.json)"
          echo "stderr: $(cat /tmp/m1.err | head -2)"
          echo "head: $(head -c 200 /tmp/m1.json)"

          echo "===== M2: length(data[?...]) --raw-output ====="
          OUT=$(oci compute instance list --compartment-id "$CID" --all \
            --query "length(data[?\"display-name\"=='n8n-server' && \"lifecycle-state\"!='TERMINATED'])" \
            --raw-output 2>/tmp/m2.err); echo "exit=$? out=[$OUT]"; echo "stderr: $(head -2 /tmp/m2.err)"

          echo "===== M3: data[?...].id --raw-output, count lines ====="
          OUT=$(oci compute instance list --compartment-id "$CID" --all \
            --query "data[?\"display-name\"=='n8n-server' && \"lifecycle-state\"!='TERMINATED'].id" \
            --raw-output 2>/tmp/m3.err); echo "exit=$? out=[$OUT]"; echo "stderr: $(head -2 /tmp/m3.err)"

          echo "===== M4: python parse of full list (most robust) ====="
          CNT=$(oci compute instance list --compartment-id "$CID" --all 2>/dev/null | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin); a=d.get('data',[]) or []
              print(len([x for x in a if x.get('display-name')=='n8n-server' and x.get('lifecycle-state')!='TERMINATED']))
          except Exception as e:
              print('PYERR:'+str(e))
          ")
          echo "M4 count=[$CNT]"
