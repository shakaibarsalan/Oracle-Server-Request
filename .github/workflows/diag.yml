name: DIAG - show raw Oracle error

on:
  workflow_dispatch:

jobs:
  diag:
    name: Diagnose one launch attempt (both regions)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Mumbai - one launch attempt with FULL error
        run: |
          set +e
          mkdir -p ~/.oci
          echo "${{ secrets.MUMBAI_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.MUMBAI_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

          echo "===== AUTH CHECK (list compartments) ====="
          oci iam compartment list --include-root --query 'data[0].id' --raw-output
          echo "auth exit code: $?"

          COMPARTMENT_ID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output 2>/dev/null)
          echo "COMPARTMENT_ID length: ${#COMPARTMENT_ID}"

          echo "===== IMAGE LOOKUP ====="
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$COMPARTMENT_ID" \
            --operating-system 'Canonical Ubuntu' \
            --operating-system-version '22.04' \
            --shape 'VM.Standard.A1.Flex' \
            --sort-by TIMECREATED \
            --query 'data[0].id' --raw-output 2>&1)
          echo "IMAGE_ID raw output: $IMAGE_ID"
          echo "IMAGE_ID length: ${#IMAGE_ID}"

          echo "===== SUBNET CHECK (does it exist / are we authorized?) ====="
          oci network subnet get --subnet-id "${{ secrets.MUMBAI_SUBNET_OCID }}" --query 'data."lifecycle-state"' --raw-output 2>&1
          echo "subnet get exit code: $?"

          echo "===== ONE LAUNCH ATTEMPT - FULL RAW RESPONSE ====="
          SSH_KEY_FILE=$(mktemp)
          printf '%s\n' "${{ secrets.SSH_PUBLIC_KEY }}" > "$SSH_KEY_FILE"
          oci compute instance launch \
            --availability-domain "AP-MUMBAI-1-AD-1" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "${{ secrets.MUMBAI_SUBNET_OCID }}" \
            --assign-public-ip true \
            --ssh-authorized-keys-file "$SSH_KEY_FILE" \
            --display-name "n8n-server" \
            --fault-domain "FAULT-DOMAIN-1" 2>&1
          echo "launch exit code: $?"
          echo "===== END MUMBAI ====="

      - name: Stockholm - one launch attempt with FULL error
        run: |
          set +e
          mkdir -p ~/.oci
          echo "${{ secrets.STOCKHOLM_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.STOCKHOLM_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

          COMPARTMENT_ID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output 2>/dev/null)
          echo "COMPARTMENT_ID length: ${#COMPARTMENT_ID}"

          IMAGE_ID=$(oci compute image list \
            --compartment-id "$COMPARTMENT_ID" \
            --operating-system 'Canonical Ubuntu' \
            --operating-system-version '22.04' \
            --shape 'VM.Standard.A1.Flex' \
            --sort-by TIMECREATED \
            --query 'data[0].id' --raw-output 2>&1)
          echo "IMAGE_ID length: ${#IMAGE_ID}"

          echo "===== SUBNET CHECK ====="
          oci network subnet get --subnet-id "${{ secrets.STOCKHOLM_SUBNET_OCID }}" --query 'data."lifecycle-state"' --raw-output 2>&1
          echo "subnet get exit code: $?"

          echo "===== ONE LAUNCH ATTEMPT - FULL RAW RESPONSE ====="
          SSH_KEY_FILE=$(mktemp)
          printf '%s\n' "${{ secrets.SSH_PUBLIC_KEY }}" > "$SSH_KEY_FILE"
          oci compute instance launch \
            --availability-domain "EU-STOCKHOLM-1-AD-1" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "${{ secrets.STOCKHOLM_SUBNET_OCID }}" \
            --assign-public-ip true \
            --ssh-authorized-keys-file "$SSH_KEY_FILE" \
            --display-name "n8n-server" \
            --fault-domain "FAULT-DOMAIN-1" 2>&1
          echo "launch exit code: $?"
          echo "===== END STOCKHOLM ====="
