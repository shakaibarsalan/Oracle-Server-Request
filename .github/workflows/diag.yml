name: DIAG - show raw Oracle error

on:
  workflow_dispatch:

env:
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  diag:
    name: Find the real availability domain + retry
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Mumbai - discover AD then launch
        run: |
          set +e
          export SUPPRESS_LABEL_WARNING=True
          mkdir -p ~/.oci
          echo "${{ secrets.MUMBAI_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.MUMBAI_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

          COMPARTMENT_ID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output 2>/dev/null)

          echo "===== REAL AVAILABILITY DOMAIN NAMES ====="
          oci iam availability-domain list --compartment-id "$COMPARTMENT_ID" --query 'data[*].name' 2>/dev/null
          REAL_AD=$(oci iam availability-domain list --compartment-id "$COMPARTMENT_ID" --query 'data[0].name' --raw-output 2>/dev/null)
          echo "Using REAL_AD: $REAL_AD"

          IMAGE_ID=$(oci compute image list --compartment-id "$COMPARTMENT_ID" \
            --operating-system 'Canonical Ubuntu' --operating-system-version '22.04' \
            --shape 'VM.Standard.A1.Flex' --sort-by TIMECREATED \
            --query 'data[0].id' --raw-output 2>/dev/null)

          echo "===== LAUNCH WITH REAL AD NAME ====="
          SSH_KEY_FILE=$(mktemp)
          printf '%s\n' "${{ secrets.SSH_PUBLIC_KEY }}" > "$SSH_KEY_FILE"
          oci compute instance launch \
            --availability-domain "$REAL_AD" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "${{ secrets.MUMBAI_SUBNET_OCID }}" \
            --assign-public-ip true \
            --ssh-authorized-keys-file "$SSH_KEY_FILE" \
            --display-name "n8n-server" 2>&1
          echo "launch exit code: $?"
          echo "===== END MUMBAI ====="

      - name: Stockholm - discover AD then launch
        run: |
          set +e
          export SUPPRESS_LABEL_WARNING=True
          mkdir -p ~/.oci
          echo "${{ secrets.STOCKHOLM_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.STOCKHOLM_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

          COMPARTMENT_ID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output 2>/dev/null)

          echo "===== REAL AVAILABILITY DOMAIN NAMES ====="
          oci iam availability-domain list --compartment-id "$COMPARTMENT_ID" --query 'data[*].name' 2>/dev/null
          REAL_AD=$(oci iam availability-domain list --compartment-id "$COMPARTMENT_ID" --query 'data[0].name' --raw-output 2>/dev/null)
          echo "Using REAL_AD: $REAL_AD"

          IMAGE_ID=$(oci compute image list --compartment-id "$COMPARTMENT_ID" \
            --operating-system 'Canonical Ubuntu' --operating-system-version '22.04' \
            --shape 'VM.Standard.A1.Flex' --sort-by TIMECREATED \
            --query 'data[0].id' --raw-output 2>/dev/null)

          echo "===== LAUNCH WITH REAL AD NAME ====="
          SSH_KEY_FILE=$(mktemp)
          printf '%s\n' "${{ secrets.SSH_PUBLIC_KEY }}" > "$SSH_KEY_FILE"
          oci compute instance launch \
            --availability-domain "$REAL_AD" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "${{ secrets.STOCKHOLM_SUBNET_OCID }}" \
            --assign-public-ip true \
            --ssh-authorized-keys-file "$SSH_KEY_FILE" \
            --display-name "n8n-server" 2>&1
          echo "launch exit code: $?"
          echo "===== END STOCKHOLM ====="
