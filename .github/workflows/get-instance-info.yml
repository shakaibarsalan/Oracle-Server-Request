name: Get Mumbai Instance Info

on:
  workflow_dispatch:

env:
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  info:
    name: Fetch n8n-server details
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Query all instances (OCID + IP + size each)
        run: |
          set +e
          export SUPPRESS_LABEL_WARNING=True
          mkdir -p ~/.oci
          echo "${{ secrets.MUMBAI_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.MUMBAI_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

          COMPARTMENT_ID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output 2>/dev/null)

          # All non-terminated instances
          IDS=$(oci compute instance list --compartment-id "$COMPARTMENT_ID" \
            --query "data[?\"lifecycle-state\"!='TERMINATED'].id" --raw-output 2>/dev/null \
            | tr -d '[]," ' | tr '\n' ' ')

          i=0
          for ID in $IDS; do
            i=$((i+1))
            echo "========== INSTANCE $i =========="
            NAME=$(oci compute instance get --instance-id "$ID" --query 'data."display-name"' --raw-output 2>/dev/null)
            STATE=$(oci compute instance get --instance-id "$ID" --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
            OCPUS=$(oci compute instance get --instance-id "$ID" --query 'data."shape-config".ocpus' --raw-output 2>/dev/null)
            MEM=$(oci compute instance get --instance-id "$ID" --query 'data."shape-config"."memory-in-gbs"' --raw-output 2>/dev/null)
            CREATED=$(oci compute instance get --instance-id "$ID" --query 'data."time-created"' --raw-output 2>/dev/null)
            PUBIP=$(oci compute instance list-vnics --instance-id "$ID" --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
            echo "NAME=$NAME"
            echo "STATE=$STATE"
            echo "OCPUS=$OCPUS  MEMORY_GB=$MEM"
            echo "CREATED=$CREATED"
            echo "PUBLIC_IP=$PUBIP"
            echo "OCID=$ID"
          done
          echo "========== TOTAL INSTANCES: $i =========="
