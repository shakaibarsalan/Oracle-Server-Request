name: Provision Stockholm VM (Oracle Always Free)

on:
  schedule:
    - cron: '*/6 * * * *'   # every 6 minutes, 24/7
  workflow_dispatch:           # also allow manual trigger

permissions:
  contents: write              # needed to commit attempts.json to the logs branch

jobs:
  provision:
    name: Try to create Stockholm VM
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.STOCKHOLM_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.STOCKHOLM_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

      - name: Attempt to create VM
        id: create_vm
        run: |
          SUBNET_OCID="${{ secrets.STOCKHOLM_SUBNET_OCID }}"
          SSH_KEY="${{ secrets.SSH_PUBLIC_KEY }}"

          COMPARTMENT_ID=$(oci iam compartment list \
            --include-root \
            --query 'data[0].id' \
            --raw-output)

          IMAGE_ID=$(oci compute image list \
            --compartment-id "$COMPARTMENT_ID" \
            --operating-system 'Canonical Ubuntu' \
            --operating-system-version '22.04' \
            --shape 'VM.Standard.A1.Flex' \
            --sort-by TIMECREATED \
            --query 'data[0].id' \
            --raw-output)

          echo "Compartment resolved."
          echo "Image resolved."

          SUCCESS=false
          for FD in "FAULT-DOMAIN-1" "FAULT-DOMAIN-2" "FAULT-DOMAIN-3" "NO-FD"; do
            if [ "$FD" = "NO-FD" ]; then
              FD_FLAG=""
              echo "Trying without fault domain..."
            else
              FD_FLAG="--fault-domain $FD"
              echo "Trying $FD..."
            fi

            RESULT=$(oci compute instance launch \
              --availability-domain "EU-STOCKHOLM-1-AD-1" \
              --compartment-id "$COMPARTMENT_ID" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
              --image-id "$IMAGE_ID" \
              --subnet-id "$SUBNET_OCID" \
              --assign-public-ip true \
              --ssh-authorized-keys-file <(echo "$SSH_KEY") \
              --display-name "n8n-server" \
              $FD_FLAG 2>&1) || true

            if echo "$RESULT" | grep -q '"id"'; then
              echo "SUCCESS=true" >> $GITHUB_OUTPUT
              PUBLIC_IP=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('public-ip','Check Oracle Console'))" 2>/dev/null || echo "Check Oracle Console")
              echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_OUTPUT
              echo "VM created successfully!"
              echo "$RESULT"
              SUCCESS=true
              break
            else
              echo "Failed: $(echo "$RESULT" | grep -o 'Out of capacity\|LimitExceeded\|InternalError' | head -1)"
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "SUCCESS=false" >> $GITHUB_OUTPUT
            echo "All attempts failed this round. Will retry in 6 minutes."
          fi

      - name: Log attempt to logs branch
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")
          STATUS="${{ steps.create_vm.outputs.SUCCESS }}"
          if [ "$STATUS" = "true" ]; then
            RESULT_TEXT="VM_CREATED"
          else
            RESULT_TEXT="FAILED"
          fi

          LOG_ENTRY="{\"region\":\"stockholm\",\"timestamp\":\"$TIMESTAMP\",\"date\":\"$DATE\",\"result\":\"$RESULT_TEXT\"}"

          RESP=$(gh api repos/${{ github.repository }}/contents/attempts.json \
            -H "Accept: application/vnd.github.v3+json" \
            --method GET -F ref=logs 2>/dev/null)
          RC=$?

          if [ $RC -eq 0 ] && echo "$RESP" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            CURRENT=$(echo "$RESP" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['content']).decode())")
            SHA=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
            UPDATED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          entry = json.loads('$LOG_ENTRY')
          data['attempts'].append(entry)
          print(json.dumps(data, indent=2))
          ")
            ENCODED=$(printf '%s' "$UPDATED" | base64 -w 0)
            gh api repos/${{ github.repository }}/contents/attempts.json \
              --method PUT \
              -H "Accept: application/vnd.github.v3+json" \
              -f message="Log Stockholm attempt $TIMESTAMP" \
              -f content="$ENCODED" \
              -f sha="$SHA" \
              -f branch="logs"
          else
            DEFAULT_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha' 2>/dev/null || echo "")
            if [ -n "$DEFAULT_SHA" ]; then
              gh api repos/${{ github.repository }}/git/refs \
                --method POST \
                -f ref="refs/heads/logs" \
                -f sha="$DEFAULT_SHA" 2>/dev/null || true
            fi
            INITIAL=$(printf '{"attempts":[%s]}' "$LOG_ENTRY")
            ENCODED=$(printf '%s' "$INITIAL" | base64 -w 0)
            gh api repos/${{ github.repository }}/contents/attempts.json \
              --method PUT \
              -H "Accept: application/vnd.github.v3+json" \
              -f message="Init log with Stockholm attempt $TIMESTAMP" \
              -f content="$ENCODED" \
              -f branch="logs"
          fi

      - name: Send success email & disable workflow
        if: steps.create_vm.outputs.SUCCESS == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "✅ Stockholm Oracle VM Created Successfully!"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "Oracle Provisioner <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          body: |
            🎉 Your Stockholm Oracle VM has been created!

            Public IP: ${{ steps.create_vm.outputs.PUBLIC_IP }}
            Time: ${{ github.run_started_at }}
            Region: eu-stockholm-1
            Domain: ${{ secrets.STOCKHOLM_DOMAIN }}

            Next steps:
            1. Go to Oracle Console → Compute → Instances → n8n-server
            2. Reserve the IP: Attached VNICs → Primary VNIC → IPv4 → Make Reserved
            3. Add DNS in Cloudflare: A record → n8n → YOUR_IP → Grey cloud (proxy OFF)
            4. SSH in: ssh -i oci_api_key.pem ubuntu@YOUR_IP
            5. Run the n8n setup script from your guide

            ⚠️  Please disable the GitHub Actions workflow now to stop further attempts:
            Go to: https://github.com/${{ github.repository }}/actions/workflows/provision-stockholm.yml
            Click "..." → Disable workflow

            Good luck with n8n! 🚀
