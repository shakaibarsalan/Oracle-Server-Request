name: Provision Stockholm VM (Oracle Always Free)

on:
  schedule:
    - cron: '0 * * * *'    # hourly trigger; each run then loops continuously for ~3h
  workflow_dispatch:          # also allow manual trigger

permissions:
  contents: write             # needed to commit attempts.json to the logs branch

# Only one Stockholm run at a time. A new trigger waits and starts when the
# current run ends, so runs chain back-to-back without piling up.
concurrency:
  group: provision-stockholm
  cancel-in-progress: false

jobs:
  provision:
    name: Try to create Stockholm VM
    runs-on: ubuntu-latest
    timeout-minutes: 200

    env:
      GH_TOKEN: ${{ github.token }}
      REGION_NAME: stockholm
      AVAILABILITY_DOMAIN: "EU-STOCKHOLM-1-AD-1"
      SUBNET_OCID: ${{ secrets.STOCKHOLM_SUBNET_OCID }}
      SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      LOOP_MINUTES: 180         # how long this run keeps retrying
      RETRY_SECONDS: 30         # wait between retry cycles
      HEARTBEAT_MINUTES: 15     # how often to log progress to attempts.json

    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.STOCKHOLM_OCI_CONFIG }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/config
          echo "${{ secrets.STOCKHOLM_OCI_KEY }}" | sed '1s/^\xEF\xBB\xBF//' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

      - name: Continuously attempt to create VM
        id: create_vm
        run: |
          set -e
          SSH_KEY_FILE=$(mktemp)
          printf '%s\n' "$SSH_KEY" > "$SSH_KEY_FILE"

          COMPARTMENT_ID=$(oci iam compartment list --include-root --query 'data[0].id' --raw-output)
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$COMPARTMENT_ID" \
            --operating-system 'Canonical Ubuntu' \
            --operating-system-version '22.04' \
            --shape 'VM.Standard.A1.Flex' \
            --sort-by TIMECREATED \
            --query 'data[0].id' --raw-output)
          echo "Compartment resolved."
          echo "Image resolved."

          # Append one log entry to attempts.json on the logs branch.
          # Args: $1 = result (FAILED|VM_CREATED), $2 = attempts in this window
          log_attempt() {
            local result="$1" count="$2"
            local ts dt entry existing sha current updated encoded initial default_sha
            ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            dt=$(date -u +"%Y-%m-%d")
            entry=$(printf '{"region":"%s","timestamp":"%s","date":"%s","result":"%s","attempts":%s}' \
              "$REGION_NAME" "$ts" "$dt" "$result" "$count")
            local try
            for try in 1 2 3; do
              existing=$(gh api "repos/${GITHUB_REPOSITORY}/contents/attempts.json?ref=logs" 2>/dev/null || echo "")
              if echo "$existing" | grep -q '"content"'; then
                sha=$(printf '%s' "$existing" | python3 -c "import sys,json;print(json.load(sys.stdin)['sha'])")
                current=$(printf '%s' "$existing" | python3 -c "import sys,json,base64;print(base64.b64decode(json.load(sys.stdin)['content']).decode())")
                updated=$(printf '%s' "$current" | ENTRY="$entry" python3 -c "import sys,json,os;d=json.load(sys.stdin);d.setdefault('attempts',[]).append(json.loads(os.environ['ENTRY']));print(json.dumps(d,indent=2))")
                encoded=$(printf '%s' "$updated" | base64 -w 0)
                if gh api "repos/${GITHUB_REPOSITORY}/contents/attempts.json" --method PUT \
                    -f message="Log ${REGION_NAME} +${count} attempts ${ts}" \
                    -f content="$encoded" -f sha="$sha" -f branch="logs" >/dev/null 2>&1; then
                  return 0
                fi
              else
                default_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha' 2>/dev/null || echo "")
                [ -n "$default_sha" ] && gh api "repos/${GITHUB_REPOSITORY}/git/refs" --method POST \
                  -f ref="refs/heads/logs" -f sha="$default_sha" >/dev/null 2>&1 || true
                initial=$(ENTRY="$entry" python3 -c "import json,os;print(json.dumps({'attempts':[json.loads(os.environ['ENTRY'])]},indent=2))")
                encoded=$(printf '%s' "$initial" | base64 -w 0)
                if gh api "repos/${GITHUB_REPOSITORY}/contents/attempts.json" --method PUT \
                    -f message="Init log ${REGION_NAME} ${ts}" \
                    -f content="$encoded" -f branch="logs" >/dev/null 2>&1; then
                  return 0
                fi
              fi
              sleep $(( (RANDOM % 5) + 1 ))
            done
            return 0
          }

          END=$(( $(date +%s) + LOOP_MINUTES * 60 ))
          HEARTBEAT_SECS=$(( HEARTBEAT_MINUTES * 60 ))
          cycles=0
          window=0
          # Make the first heartbeat fire ~90s in (quick proof of life)
          last_log=$(( $(date +%s) - HEARTBEAT_SECS + 90 ))
          SUCCESS=false

          set +e   # tolerate transient errors during the long loop
          while [ "$(date +%s)" -lt "$END" ]; do
            cycles=$((cycles + 1)); window=$((window + 1))
            for FD in "FAULT-DOMAIN-1" "FAULT-DOMAIN-2" "FAULT-DOMAIN-3" "NO-FD"; do
              if [ "$FD" = "NO-FD" ]; then FD_FLAG=""; else FD_FLAG="--fault-domain $FD"; fi
              RESULT=$(oci compute instance launch \
                --availability-domain "$AVAILABILITY_DOMAIN" \
                --compartment-id "$COMPARTMENT_ID" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
                --image-id "$IMAGE_ID" \
                --subnet-id "$SUBNET_OCID" \
                --assign-public-ip true \
                --ssh-authorized-keys-file "$SSH_KEY_FILE" \
                --display-name "n8n-server" \
                $FD_FLAG 2>&1) || true
              if echo "$RESULT" | grep -q '"id"'; then
                SUCCESS=true
                PUBLIC_IP=$(echo "$RESULT" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('data',{}).get('public-ip','Check Oracle Console'))" 2>/dev/null || echo "Check Oracle Console")
                echo "SUCCESS=true" >> $GITHUB_OUTPUT
                echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_OUTPUT
                break
              fi
            done

            if [ "$SUCCESS" = "true" ]; then
              log_attempt "VM_CREATED" "$window"
              echo "🎉 VM created after $cycles cycles!"
              break
            fi

            now=$(date +%s)
            if [ $(( now - last_log )) -ge "$HEARTBEAT_SECS" ]; then
              log_attempt "FAILED" "$window"
              echo "Heartbeat: $cycles cycles total this run (logged $window this window). Still out of capacity."
              window=0
              last_log=$now
            fi
            sleep "$RETRY_SECONDS"
          done

          # Flush any remaining un-logged attempts
          if [ "$SUCCESS" != "true" ]; then
            [ "$window" -gt 0 ] && log_attempt "FAILED" "$window"
            echo "SUCCESS=false" >> $GITHUB_OUTPUT
            echo "No capacity this run after $cycles cycles. Next run will continue trying."
          fi

      - name: Send success email
        if: steps.create_vm.outputs.SUCCESS == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "✅ Stockholm Oracle VM Created Successfully!"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "Oracle Provisioner <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          body: |
            🎉 Your Stockholm Oracle VM has been created!

            Public IP: ${{ steps.create_vm.outputs.PUBLIC_IP }}
            Time: ${{ github.run_started_at }}
            Region: eu-stockholm-1
            Domain: ${{ secrets.STOCKHOLM_DOMAIN }}

            Next steps:
            1. Go to Oracle Console → Compute → Instances → n8n-server
            2. Reserve the IP: Attached VNICs → Primary VNIC → IPv4 → Make Reserved
            3. Add DNS in Cloudflare: A record → n8n → YOUR_IP → Grey cloud (proxy OFF)
            4. SSH in: ssh -i oci_api_key.pem ubuntu@YOUR_IP
            5. Run the n8n setup script from your guide

            ⚠️  Please disable the GitHub Actions workflow now to stop further attempts:
            Go to: https://github.com/${{ github.repository }}/actions/workflows/provision-stockholm.yml
            Click "..." → Disable workflow

            Good luck with n8n! 🚀
